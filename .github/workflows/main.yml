import React, { useState, useEffect } from "react";
import "@/App.css";
import { Card, CardContent, CardDescription, CardHeader, CardTitle } from "@/components/ui/card";
import { Tabs, TabsContent, TabsList, TabsTrigger } from "@/components/ui/tabs";
import { Button } from "@/components/ui/button";
import { Input } from "@/components/ui/input";
import { Label } from "@/components/ui/label";
import { Select, SelectContent, SelectItem, SelectTrigger, SelectValue } from "@/components/ui/select";
import { Separator } from "@/components/ui/separator";
import { Badge } from "@/components/ui/badge";
import { Trash2, Plus, Save, Dices, CheckCircle2, XCircle, FileText, Edit, PlusCircle, Download, Upload } from "lucide-react";
import { Alert, AlertDescription } from "@/components/ui/alert";
import { Textarea } from "@/components/ui/textarea";

// ================== DATOS INICIALES ==================
const initialScales = {
  Barthel: {
    name: "Índice de Barthel",
    items: [
      { name: "Comer", options: [{ value: 0, label: "Dependiente" }, { value: 10, label: "Independiente" }] },
      { name: "Movilidad", options: [{ value: 0, label: "Inmóvil" }, { value: 15, label: "Independiente" }] }
    ],
    cutoffPoints: [
      { min: 0, max: 20, interpretation: "Dependencia Total" },
      { min: 21, max: 60, interpretation: "Dependencia Moderada" },
      { min: 61, max: 100, interpretation: "Independiente" }
    ]
  }
};

// ================== APP ==================
export default function App() {
  const [scales, setScales] = useState(initialScales);
  const [selectedScaleKey, setSelectedScaleKey] = useState("Barthel");
  const [scores, setScores] = useState({});
  const [history, setHistory] = useState([]);

  // práctica
  const [randomScore, setRandomScore] = useState(null);
  const [selectedAnswer, setSelectedAnswer] = useState("");
  const [showResult, setShowResult] = useState(false);

  // crear escala texto
  const [newScaleText, setNewScaleText] = useState("");

  const currentScale = scales[selectedScaleKey];

  // ================== PERSISTENCIA ==================
  useEffect(() => {
    const s = localStorage.getItem("scales_pro");
    const h = localStorage.getItem("history_pro");
    if (s) setScales(JSON.parse(s));
    if (h) setHistory(JSON.parse(h));
  }, []);

  useEffect(() => {
    localStorage.setItem("scales_pro", JSON.stringify(scales));
  }, [scales]);

  useEffect(() => {
    localStorage.setItem("history_pro", JSON.stringify(history));
  }, [history]);

  // ================== LÓGICA ==================
  const handleScore = (item, value) => {
    setScores({ ...scores, [item]: Number(value) });
  };

  const calculateTotal = () => Object.values(scores).reduce((a, b) => a + b, 0);

  const getInterpretation = () => {
    const total = calculateTotal();
    return currentScale.cutoffPoints.find(c => total >= c.min && total <= c.max)?.interpretation;
  };

  const saveEvaluation = () => {
    const entry = {
      date: new Date().toLocaleString(),
      scale: selectedScaleKey,
      total: calculateTotal(),
      interpretation: getInterpretation()
    };
    setHistory([entry, ...history]);
  };

  // ================== EXPORT / IMPORT ==================
  const exportScales = () => {
    const blob = new Blob([JSON.stringify(scales, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "scales.json";
    a.click();
  };

  const importScales = (file) => {
    const reader = new FileReader();
    reader.onload = e => setScales(JSON.parse(e.target.result));
    reader.readAsText(file);
  };

  // ================== PARSER TEXTO ==================
  const parseScale = (text) => {
    try {
      const lines = text.split("\n").filter(l => l.trim());
      let name = "Nueva";
      let items = [];
      let cutoffs = [];
      let section = "";
      let currentItem = null;

      for (let l of lines) {
        l = l.trim();
        if (l.startsWith("Nombre:")) name = l.replace("Nombre:", "").trim();
        else if (l === "Items:") section = "items";
        else if (l === "Puntos de corte:") section = "cutoff";
        else if (section === "items") {
          if (l.startsWith("-")) {
            if (currentItem) items.push(currentItem);
            currentItem = { name: l.slice(1).trim(), options: [] };
          } else {
            const [v, label] = l.split(":");
            currentItem.options.push({ value: Number(v), label });
          }
        } else if (section === "cutoff") {
          const [range, label] = l.split(":");
          const [min, max] = range.split("-").map(Number);
          cutoffs.push({ min, max, interpretation: label });
        }
      }
      if (currentItem) items.push(currentItem);
      return { name, items, cutoffPoints: cutoffs };
    } catch {
      return null;
    }
  };

  const saveTextScale = () => {
    const s = parseScale(newScaleText);
    if (!s) return alert("Error formato");
    const key = s.name.replace(/\s+/g, "_");
    setScales({ ...scales, [key]: s });
  };

  // ================== PRÁCTICA ==================
  const generateRandom = () => {
    const max = 100;
    setRandomScore(Math.floor(Math.random() * max));
    setShowResult(false);
  };

  const checkAnswer = () => {
    setShowResult(true);
  };

  const correctAnswer = currentScale.cutoffPoints.find(
    c => randomScore >= c.min && randomScore <= c.max
  )?.interpretation;

  // ================== UI ==================
  return (
    <div className="p-6 max-w-5xl mx-auto">
      <h1 className="text-3xl font-bold mb-4">Escalas Clínicas PRO FINAL</h1>

      <Tabs defaultValue="usar">
        <TabsList className="grid grid-cols-4 mb-4">
          <TabsTrigger value="usar">Usar</TabsTrigger>
          <TabsTrigger value="historial">Historial</TabsTrigger>
          <TabsTrigger value="practica">Práctica</TabsTrigger>
          <TabsTrigger value="crear">Crear</TabsTrigger>
        </TabsList>

        {/* USAR */}
        <TabsContent value="usar">
          <Card>
            <CardContent className="p-4 space-y-4">
              <Select value={selectedScaleKey} onValueChange={setSelectedScaleKey}>
                <SelectTrigger><SelectValue /></SelectTrigger>
                <SelectContent>
                  {Object.keys(scales).map(k => (
                    <SelectItem key={k} value={k}>{scales[k].name}</SelectItem>
                  ))}
                </SelectContent>
              </Select>

              {currentScale.items.map((item, i) => (
                <div key={i}>
                  <Label>{item.name}</Label>
                  <Select onValueChange={v => handleScore(item.name, v)}>
                    <SelectTrigger><SelectValue placeholder="Selecciona" /></SelectTrigger>
                    <SelectContent>
                      {item.options.map((o, j) => (
                        <SelectItem key={j} value={o.value.toString()}>{o.label}</SelectItem>
                      ))}
                    </SelectContent>
                  </Select>
                </div>
              ))}

              <div className="flex justify-between">
                <Badge>Total: {calculateTotal()}</Badge>
                <Badge>{getInterpretation()}</Badge>
              </div>

              <Button onClick={saveEvaluation}>Guardar evaluación</Button>
            </CardContent>
          </Card>
        </TabsContent>

        {/* HISTORIAL */}
        <TabsContent value="historial">
          <Card>
            <CardContent className="p-4">
              {history.map((h, i) => (
                <div key={i} className="border-b py-2 text-sm">
                  {h.date} - {h.scale} - {h.total} ({h.interpretation})
                </div>
              ))}
            </CardContent>
          </Card>
        </TabsContent>

        {/* PRACTICA */}
        <TabsContent value="practica">
          <Card>
            <CardContent className="p-4 space-y-4">
              <Button onClick={generateRandom}><Dices className="mr-2"/>Generar</Button>
              {randomScore !== null && (
                <>
                  <div className="text-5xl">{randomScore}</div>
                  <Select onValueChange={setSelectedAnswer}>
                    <SelectTrigger><SelectValue placeholder="Respuesta"/></SelectTrigger>
                    <SelectContent>
                      {currentScale.cutoffPoints.map((c,i)=>(
                        <SelectItem key={i} value={c.interpretation}>{c.interpretation}</SelectItem>
                      ))}
                    </SelectContent>
                  </Select>
                  <Button onClick={checkAnswer}>Comprobar</Button>

                  {showResult && (
                    <Badge>
                      {selectedAnswer === correctAnswer ? "Correcto" : `Incorrecto → ${correctAnswer}`}
                    </Badge>
                  )}
                </>
              )}
            </CardContent>
          </Card>
        </TabsContent>

        {/* CREAR */}
        <TabsContent value="crear">
          <Card>
            <CardContent className="p-4 space-y-4">
              <Textarea value={newScaleText} onChange={e=>setNewScaleText(e.target.value)} placeholder="Formato texto..."/>
              <Button onClick={saveTextScale}><Save className="mr-2"/>Guardar escala</Button>

              <div className="flex gap-2">
                <Button onClick={exportScales}><Download className="mr-2"/>Exportar</Button>
                <Input type="file" onChange={e=>importScales(e.target.files[0])}/>
              </div>
            </CardContent>
          </Card>
        </TabsContent>

      </Tabs>
    </div>
  );
}
